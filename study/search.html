        function bindFluidWaveNavigation() {
            const resultLinks = document.querySelectorAll('.capsule-panel, .back-home-btn');
            resultLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    const destination = this.getAttribute('href');
                    if (!destination || destination === '#' || destination.startsWith('#')) return;

                    e.preventDefault();
                    sessionStorage.setItem('activeUniversalTargetUrl', this.href);

                    resultLinks.forEach(l => l.classList.remove('is-wave-loading'));
                    this.classList.add('is-wave-loading');

                    setTimeout(() => {
                        window.location.href = destination;
                    }, 750);
                });
            });
        }

        function executeManualSearchEngine() {
            const urlParams = new URLSearchParams(window.location.search);
            let rawQuery = urlParams.get('q') || '';
            rawQuery = rawQuery.replace(/\+/g, ' ').trim();
            
            document.getElementById('queryTarget').textContent = `Showing results for: "${rawQuery}"`;

            const titleEl = document.getElementById('statusTitle');
            const msgEl = document.getElementById('statusMessage');
            const containerEl = document.getElementById('capsuleContainer');

            const cleanQuery = rawQuery.toLowerCase().replace(/[.,\/#!$%\^\*;:{}=\-_`~()]/g, "").trim();

            if (cleanQuery.length < 3) {
                titleEl.textContent = "Not found";
                msgEl.textContent = "Please enter full word to know";
                containerEl.innerHTML = "";
                bindFluidWaveNavigation();
                return;
            }

            // SMART NUTRITION REDIRECT CHECK
            const isNutritionQuery = cleanQuery.split(/\s+/).some(word => nutritionKeywords.has(word)) ||
                                     Array.from(nutritionKeywords).some(k => cleanQuery.includes(k));

            if (isNutritionQuery) {
                titleEl.textContent = "Redirecting";
                msgEl.textContent = "Taking you to Nutrition page...";
                containerEl.innerHTML = `
                    <div class="capsule-panel">
                        <span class="nav-text">Nutrition Portal</span>
                        <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                    </div>
                `;
                setTimeout(() => {
                    window.location.replace(`/search.html?q=${encodeURIComponent(rawQuery)}`);
                }, 750);
                return;
            }

            if (commonFilterWords.has(cleanQuery)) {
                titleEl.textContent = "Not found";
                msgEl.textContent = "These are common words so please try other words";
                containerEl.innerHTML = "";
                bindFluidWaveNavigation();
                return;
            }

            let matchedPages = [];
            const isGenericMassWord = highVolumeWords.has(cleanQuery);

            for (const page of siteSearchIndex) {
                const containsMatch = page.words.some(keyword => keyword.includes(cleanQuery));
                if (containsMatch) {
                    matchedPages.push(page);
                }
            }

            // INSTANT BYPASS ROUTER: Direct jump if query belongs to exactly 1 study page
            if (matchedPages.length === 1) {
                let singleDestinationPage = matchedPages[0];
                let secureLandingRedirectUrl = singleDestinationPage.url;

                if (singleDestinationPage.url === "/study/contents.html") {
                    const matchingKeyword = singleDestinationPage.words.find(keyword => keyword.includes(cleanQuery));
                    if (matchingKeyword && sectionMapping[matchingKeyword]) {
                        secureLandingRedirectUrl += sectionMapping[matchingKeyword];
                    } else {
                        secureLandingRedirectUrl += `?shq=${encodeURIComponent(rawQuery)}`;
                    }
                } else {
                    secureLandingRedirectUrl += `?shq=${encodeURIComponent(rawQuery)}`;
                }

                window.location.replace(secureLandingRedirectUrl);
                return;
            }

            // MULTI-RESULT SELECTION UI
            if (matchedPages.length > 0) {
                titleEl.textContent = "Found";
                
                if (isGenericMassWord) {
                    msgEl.textContent = matchedPages.length === 1 
                        ? "but many words are there in this page" 
                        : "but many words are there in these pages";
                } else {
                    msgEl.textContent = matchedPages.length === 1 
                        ? "it is available in this page" 
                        : "it is available in these pages";
                }

                containerEl.className = "capsule-container";

                if (matchedPages.length === 4) {
                    containerEl.classList.add("grid-layout-2x2");
                } else if (matchedPages.length > 1) {
                    containerEl.classList.add("multi-layout-side-by-side");
                }

                containerEl.innerHTML = matchedPages.map(page => {
                    let destinationLink = page.url;

                    if (page.url === "/study/contents.html") {
                        const matchingKeyword = page.words.find(keyword => keyword.includes(cleanQuery));
                        if (matchingKeyword && sectionMapping[matchingKeyword]) {
                            destinationLink += sectionMapping[matchingKeyword];
                        } else {
                            destinationLink += `?shq=${encodeURIComponent(rawQuery)}`;
                        }
                    } else {
                        destinationLink += `?shq=${encodeURIComponent(rawQuery)}`;
                    }

                    return `
                        <a href="${destinationLink}" class="capsule-panel">
                            <span class="nav-text">${page.title}</span>
                            <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                        </a>
                    `;
                }).join('');

            } else {
                titleEl.textContent = "Not found";
                msgEl.textContent = "The word you're searching is not available here";
                containerEl.innerHTML = "";
            }

            bindFluidWaveNavigation();
        }

        // Trigger Smooth Workspace Loader
        window.addEventListener('DOMContentLoaded', () => {
            executeManualSearchEngine();
            
            setTimeout(() => {
                const activeFrameNode = document.getElementById('searchWorkspace');
                if (activeFrameNode) {
                    activeFrameNode.classList.add('is-initialized');
                }
            }, 60);
        });

        window.addEventListener('pageshow', () => {
            if (document.activeElement && document.activeElement.blur) {
                document.activeElement.blur();
            }

            const resultLinks = document.querySelectorAll('.capsule-panel, .back-home-btn');
            resultLinks.forEach(l => {
                l.classList.remove('is-wave-loading');
                const span = l.querySelector('.nav-text');
                if (span) {
                    span.style.transform = '';
                    span.style.opacity = '';
                    span.style.background = '';
                    span.style.webkitBackgroundClip = '';
                    span.style.webkitTextFillColor = '';
                }
            });

            const savedTargetUrl = sessionStorage.getItem('activeUniversalTargetUrl');
            if (savedTargetUrl) {
                sessionStorage.removeItem('activeUniversalTargetUrl');
            }
        });
    </script>
</body>
</html>
