<head>

    <link rel="icon" type="image/png" href="favicon.png">
     
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Theme Token System */
        :root {
            /* Smooth Premium Deceleration Curve */
            --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
            
            /* Default Dark Mode Tones */
            --bg-color: #0b0b0b;
            --text-main: #ffffff;
            --text-muted: #555555;
            --panel-bg: #121212;
            --panel-border: #222222;
            --row-divider: #1c1c1c;
            --row-hover: rgba(255, 255, 255, 0.015);

            /* Premium Matte Olive Header System (Dark Mode) */
            --header-bg: #131815;
            --header-border: #222c26;
        }

        /* Classy Light Mode Tones (Premium Off-White Gallery Style) */
        body.light-mode {
            --bg-color: #f5f5f7;
            --text-main: #111111;
            --text-muted: #a1a1a6;
            --panel-bg: #ffffff;
            --panel-border: #e2e2e7;
            --row-divider: #f2f2f7;
            --row-hover: rgba(0, 0, 0, 0.01);

            /* Premium Matte Olive Header System (Light Mode) */
            --header-bg: #e9ebe6;
            --header-border: #d4d8cf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* CORE FIX: Prevents layout engine from stretching vertical gaps on low-content pages */
            padding: 60px 24px;
            max-width: 1200px;
            margin: 0 auto;
            width: 95%;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            
            /* Buttery Smooth Silent Theme Transition Engine */
            transition: background-color 0.6s var(--ease-premium), color 0.6s var(--ease-premium);
        }

        /* iPad & WebKit Optimization: Absolute 3D layout vectors to match Windows performance physics */
        @keyframes masterEntrance {
            from {
                opacity: 0;
                transform: translate3d(0, 24px, 0);
            }
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        /* Staggered Load Engine */
        header, .breadcrumbs, .capsule-panel, footer {
            opacity: 0;
            will-change: transform, opacity;
            animation: masterEntrance 1.2s var(--ease-premium) forwards;
        }

        header { animation-delay: 0.04s; }
        .breadcrumbs { animation-delay: 0.10s; } 
        
        /* Sequential wave opening sequence for stretched panels */
        .capsule-panel:nth-child(1) { animation-delay: 0.16s; }
        .capsule-panel:nth-child(2) { animation-delay: 0.22s; }
        .capsule-panel:nth-child(3) { animation-delay: 0.28s; }
        
        footer { animation-delay: 0.40s; }

        /* Top Header Navigation Shell */
        header {
            position: relative;
            background-color: var(--header-bg);
            border: 1px solid var(--header-border);
            border-radius: 50px;
            width: 100%; 
            height: 72px; 
            margin: 0 auto 20px auto; /* LOCKED SPACING: 20px bottom margin directly above breadcrumbs */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            overflow: hidden; 
            transition: background-color 0.6s var(--ease-premium), border-color 0.6s var(--ease-premium), box-shadow 0.6s var(--ease-premium);
        }

        body:not(.light-mode) header {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        /* Twin View System Layer Configurations */
        .header-inner-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px; 
            will-change: opacity, transform;
            transition: opacity 0.45s var(--ease-premium), transform 0.45s var(--ease-premium);
        }

        #headerMainView {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        header.search-active #headerMainView {
            opacity: 0;
            transform: translateY(-10px); 
            pointer-events: none;
        }

        #headerSearchView {
            opacity: 0;
            transform: translateY(10px); 
            pointer-events: none;
        }
        header.search-active #headerSearchView {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .header-right-cluster, .search-control-cluster {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0; 
            height: 100%;
        }

        .logo {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none !important;
            transition: color 0.6s var(--ease-premium);
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent !important;
            tap-highlight-color: transparent !important;
        }

        .ctrl-btn {
            background: none;
            border: none;
            outline: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;  
            height: 32px; 
            padding: 0;
            flex-shrink: 0;
            transition: opacity 0.2s var(--ease-premium), color 0.6s var(--ease-premium);
            -webkit-tap-highlight-color: transparent !important;
            tap-highlight-color: transparent !important;
        }

        .ctrl-btn:hover {
            opacity: 0.6;
        }

        .ctrl-btn svg, .search-static-icon {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: var(--text-main);
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.6s var(--ease-premium);
        }

        .search-static-icon {
            opacity: 0.4;
            flex-shrink: 0; 
        }

        .search-core-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            padding: 0 16px;
            width: 100%;
            min-width: 0; 
            transition: color 0.6s var(--ease-premium);
        }

        .clear-text-btn svg { opacity: 0.4; }
        .close-search-btn svg { opacity: 0.7; }

        .theme-toggle {
            width: 32px;  
            height: 32px; 
            position: relative;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent !important;
            tap-highlight-color: transparent !important;
        }

        .theme-toggle svg {
            position: absolute;
            width: 22px;
            height: 22px;
            fill: none;
            stroke: var(--text-main);
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform-origin: center center;
            will-change: transform, opacity;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            transition: transform 0.6s var(--ease-premium), opacity 0.6s var(--ease-premium), stroke 0.6s var(--ease-premium);
        }

        .theme-toggle .sun-icon {
            opacity: 0;
            transform: translate3d(0, 0, 0) rotate(-90deg) scale(0.4);
        }
        .theme-toggle .moon-icon {
            opacity: 1;
            transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
        }
        body.light-mode .theme-toggle .sun-icon {
            opacity: 1;
            transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
        }
        body.light-mode .theme-toggle .moon-icon {
            opacity: 0;
            transform: translate3d(0, 0, 0) rotate(90deg) scale(0.4);
        }

        /* Core Layout Architecture Engine */
        main {
            flex-grow: 1; /* CORE FIX: Forces main content view to absorb all remaining empty workspace space */
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* High-End Classy Breadcrumb System */
        .breadcrumbs {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px; /* SYMMETRICAL RHYTHM: 20px above breadcrumbs, 20px below breadcrumbs */
            font-size: 14.5px;
            font-weight: 500;
            letter-spacing: 0.2px;
            padding: 0 8px; 
        }

        .breadcrumbs a {
            color: var(--text-muted);
            text-decoration: none !important;
            transition: color 0.4s var(--ease-premium);
            -webkit-tap-highlight-color: transparent !important;
        }

        .breadcrumbs a:hover {
            color: var(--text-main);
        }

        .breadcrumbs .separator {
            color: var(--row-divider);
            font-weight: 400;
            user-select: none;
        }

        .breadcrumbs .current {
            color: var(--text-main);
            opacity: 0.9;
        }

        /* Stretched Notes Layout Container */
        .notes-canvas {
            display: flex;
            flex-direction: column;
            gap: 32px;
            margin-bottom: 80px;
            width: 100%;
        }

        /* Large Premium Capsule Panel Container */
        .capsule-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 32px 8px 16px 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            width: 100%;
            transition: border-color 0.6s var(--ease-premium), background-color 0.6s var(--ease-premium);
        }

        body:not(.light-mode) .capsule-panel {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .capsule-panel:hover {
            border-color: #444444;
        }

        body.light-mode .capsule-panel:hover {
            border-color: #b8b8bc;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text-main);
            margin-bottom: 24px;
            padding: 0 24px;
            transition: color 0.6s var(--ease-premium);
        }

        /* Flat Reference Data Rows */
        .document-list {
            list-style: none;
            display: flex;
            flex-direction: column;
        }

        .document-list li {
            border-bottom: 1px solid var(--row-divider);
            transition: background-color 0.4s var(--ease-premium), border-color 0.6s var(--ease-premium);
        }

        .document-list li:last-child {
            border-bottom: none;
        }

        .document-list a {
            display: block;
            padding: 14px 24px;
            color: var(--text-main);
            opacity: 0.8;
            text-decoration: none !important;
            font-size: 14.5px;
            font-weight: 400;
            transition: color 0.4s var(--ease-premium), padding-left 0.4s var(--ease-premium), opacity 0.4s var(--ease-premium);
            -webkit-tap-highlight-color: transparent !important;
        }

        .document-list li:hover {
            background-color: var(--row-hover);
        }

        .document-list li:hover a {
            opacity: 1;
            padding-left: 32px; 
        }

        /* Flat Grounded Footer Row */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
            flex-shrink: 0; /* Keeps footer pinned strictly to canvas floor layout bounds */
        }

        .footer-links-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
            width: 100%;
        }

        .footer-links-row a {
            color: var(--text-muted);
            text-decoration: none !important;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.4s var(--ease-premium);
        }

        .footer-links-row a:hover {
            color: var(--text-main);
        }

        .copyright-tag {
            color: var(--text-muted);
            opacity: 0.6;
            font-size: 12.5px;
            letter-spacing: 0.2px;
            transition: color 0.4s var(--ease-premium);
        }

        /* iPad & Phone Viewport Adjustments */
        @media (max-width: 700px) {
            .capsule-panel {
                padding: 28px 4px 12px 4px;
            }
            
            body {
                padding: 40px 20px;
            }
            
            header {
                margin-bottom: 16px; /* FIXED: Harmonized 16px mobile top spacing gap */
                height: 64px; 
            }
            
            .header-inner-view {
                padding: 0 20px; 
            }
            
            .logo {
                font-size: 22px;
            }

            .search-core-input {
                padding: 0 12px; 
                font-size: 15px;
            }

            .header-right-cluster, .search-control-cluster {
                gap: 16px; 
            }
            
            .breadcrumbs {
                margin-bottom: 16px; /* FIXED: Harmonized 16px mobile bottom spacing gap */
                padding: 0 4px;
            }
        }
    </style>
</head>
<body>

    <!-- Exact Header Engine Cloned from index.html -->
    <header id="masterHeader">
        <div class="header-inner-view" id="headerMainView">
            <a href="index.html" class="logo">sathya.</a>
            <div class="header-right-cluster">
                <div class="theme-toggle" id="themeToggleBtn" aria-label="Toggle visual palette theme">
                    <svg class="sun-icon" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24">
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                    </svg>
                </div>
                <button class="ctrl-btn" id="openSearchBtn" aria-label="Open Workspace Search">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </div>

        <div class="header-inner-view" id="headerSearchView">
            <svg class="search-static-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" class="search-core-input" id="searchCoreInput" placeholder="Search..." autocomplete="off">
            <div class="search-control-cluster">
                <button class="ctrl-btn clear-text-btn" id="clearSearchBtn" aria-label="Clear typed text">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <button class="ctrl-btn close-search-btn" id="closeSearchBtn" aria-label="Minimize search pill">
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </header>

    <main>
        <!-- Premium Classy Breadcrumbs -->
        <nav class="breadcrumbs" aria-label="breadcrumb">
            <a href="index.html">Home</a>
            <span class="separator">/</span>
            <span class="current">Notes</span>
        </nav>

        <!-- Stretched Notes Layout Container -->
        <div class="notes-canvas">

            <!-- First Stretched Topic Capsule: Environment -->
            <div class="capsule-panel">
                <h2 class="panel-title">Environment</h2>
                <ul class="document-list">
                    <li><a href="#">Ramsar sites</a></li>
                </ul>
            </div>
            
        </div>
    </main>

    <!-- Grounded Minimal Footer -->
    <footer>
        <div class="footer-links-row">
           <a href="Footer/about.html">About</a>
            <a href="Footer/contact.html">Contact</a>
            <a href="Footer/privacy.html">Privacy Policy</a>
            <a href="Footer/terms.html">Terms & Conditions</a>
            <a href="Footer/disclaimer.html">Disclaimer</a>
        </div>
        <div class="copyright-tag">
            &copy; 2026 Sathya. All rights reserved.
        </div>
    </footer>

    <!-- Smart Native Device Sync & Twin-View Controller Engine -->
    <script>
        const toggleBtn = document.getElementById('themeToggleBtn');
        const bodyElement = document.body;
        const systemLightQuery = window.matchMedia('(prefers-color-scheme: light)');

        const masterHeader = document.getElementById('masterHeader');
        const openSearchBtn = document.getElementById('openSearchBtn');
        const closeSearchBtn = document.getElementById('closeSearchBtn');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const searchCoreInput = document.getElementById('searchCoreInput');

        function applyTargetPalette() {
            const activeSessionOverride = sessionStorage.getItem('dashboard-theme');
            if (activeSessionOverride) {
                if (activeSessionOverride === 'light') {
                    bodyElement.classList.add('light-mode');
                } else {
                    bodyElement.classList.remove('light-mode');
                }
            } else {
                if (systemLightQuery.matches) {
                    bodyElement.classList.add('light-mode');
                } else {
                    bodyElement.classList.remove('light-mode');
                }
            }
        }

        applyTargetPalette();

        systemLightQuery.addEventListener('change', (e) => {
            sessionStorage.removeItem('dashboard-theme');
            if (e.matches) {
                bodyElement.classList.add('light-mode');
            } else {
                bodyElement.classList.remove('light-mode');
            }
        });

        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            const isCurrentlyLight = bodyElement.classList.contains('light-mode');
            if (isCurrentlyLight) {
                bodyElement.classList.remove('light-mode');
                sessionStorage.setItem('dashboard-theme', 'dark');
            } else {
                bodyElement.classList.add('light-mode');
                sessionStorage.setItem('dashboard-theme', 'light');
            }
        });

        // --- Twin-View Interface Controller System ---

        openSearchBtn.addEventListener('click', () => {
            masterHeader.classList.add('search-active');
            setTimeout(() => { searchCoreInput.focus(); }, 50);
        });

        clearSearchBtn.addEventListener('click', () => {
            searchCoreInput.value = "";
            searchCoreInput.focus();
        });

        closeSearchBtn.addEventListener('click', () => {
            masterHeader.classList.remove('search-active');
        });

        searchCoreInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && searchCoreInput.value.trim() === "") {
                masterHeader.classList.remove('search-active');
            }
        });
    </script>
</body>
