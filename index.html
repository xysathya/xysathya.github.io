<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>sathya.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

:root{

--bg:#000000;

--text:#cfcfcf;

--title:#efefef;

--line:#2f2f2f;

--card:#0a0a0a;
}

/* LIGHT MODE */

body.light-mode{

--bg:#cfcfcf;

--text:#111111;

--title:#000000;

--line:rgba(0,0,0,0.12);

--card:#d9d9d9;
}

body{

background:var(--bg);;
color:var(--text);

font-family:'Poppins',sans-serif;

transition:
background 0.55s cubic-bezier(0.22,1,0.36,1),
color 0.55s cubic-bezier(0.22,1,0.36,1);
  
min-height:100vh;

padding:40px 28px 80px;

overflow-x:hidden;
  
-webkit-font-smoothing:antialiased;

-moz-osx-font-smoothing:grayscale;

text-rendering:optimizeLegibility;
}

/* MAIN */

.wrapper{
max-width:1200px;
width:100%;
margin:auto;
}

/* LOGO */

.logo{

position:relative;
top:-10px;
font-size:35px;
font-weight:600;

letter-spacing:-2px;

color:var(--title);

margin-bottom:42px;
}

/* QUOTE */

.quote{

border-left:2px solid #var(--text);

padding-left:22px;

font-size:18px;
font-weight:400;

line-height:1.7;

color:var(--text);

max-width:900px;

margin-bottom:90px;
}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:56px;
}

/* CATEGORY */

.category h2{

font-size:30px;
font-weight:600;

letter-spacing:-1px;

margin-bottom:16px;

color:var(--text);
}

.line{

height:1px;
width:100%;

background:var(--line);

margin-bottom:24px;
}

/* LINKS */

.links{

display:flex;
flex-direction:column;

gap:16px;
}

.links a{

text-decoration:none;

color:var(--text);

font-size:18px;
font-weight:400;

transition:
transform 0.18s ease,
opacity 0.18s ease,
color 0.18s ease;

width:fit-content;
}

.links a:hover{

transform:translateX(4px);

opacity:1;

color:#ffffff;
}

/* TABLET */

@media(max-width:1024px){

body{
padding:34px 24px 70px;
}

.logo{
font-size:35px;
}

.quote{

font-size:18px;

margin-bottom:70px;
}

.grid{

grid-template-columns:1fr;

gap:18px;
}

.category h2{
font-size:30px;
}

.links a{
font-size:18px;
}

}

/* MOBILE */

@media(max-width:640px){

body{
padding:28px 20px 60px;
}

.logo{

font-size:35px;

margin-bottom:34px;
}

.quote{

font-size:15px;

padding-left:18px;

line-height:1.6;

margin-bottom:56px;
}

.grid{
gap:42px;
}

.category h2{
font-size:28px;
}

.links a{
font-size:18px;
}

}

.menu-btn{

position:fixed;

top:28px;
right:40px;

font-size:28px;

color:var(--text);

cursor:pointer;

z-index:2000;

transition:
transform 0.35s ease,
opacity 0.25s ease;

user-select:none;
font-family: 'poppins',sans-serif;
font-variant-emoji:text;
}

.menu-btn:hover{

opacity:0.7;
}

.menu-btn.active{

transform:rotate(180deg);
}

.sidebar{

position:fixed;

top:20px;
right:20px;

width:260px;
height:auto;

background:var(--card);

border:1px solid rgba(255,255,255,0.05);

border-radius:28px;

padding-top:110px;
padding-bottom:34px;

padding-left:34px;
padding-right:34px;

transform:translateX(120%);

transition:
transform 0.45s cubic-bezier(0.22,1,0.36,1);

z-index:1500;

box-shadow:
0 20px 60px rgba(0,0,0,0.45);

will-change:transform;
}
  
.sidebar.open{

transform:translateX(0);
}

.sidebar a{

display:block;

color:var(--text);

text-decoration:none;

font-size:18px;

margin-bottom:10px;

transition:
transform 0.2s ease,
color 0.2s ease;

}

.sidebar a:hover{

color:var(--text);

transform:translateX(4px);
}

/* IPAD */

@media(min-width:768px) and (max-width:1024px){

body{
padding:40px 28px 80px;
}

.sidebar{

width:250px;

top:18px;

border-radius:28px;
}

.sidebar.open{
right:18px;
}

}

/* MOBILE */

@media(max-width:767px){

body{
padding:28px 18px 60px;
}

.sidebar{

width:220px;

top:14px;

border-radius:24px;
}

.sidebar.open{
right:14px;
}

}

/* IPAD */

@media(min-width:768px) and (max-width:1024px){

.wrapper{

max-width:92%;
}

}

/* MOBILE */

@media(max-width:767px){

.wrapper{

max-width:100%;
}

}

/* THEME BUTTON */

.theme-btn{

position:fixed;

top:34px;
right:100px;

width:34px;
height:34px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.05);

color:#cfcfcf;

font-size:16px;

cursor:pointer;

z-index:2000;

transition:
background 0.45s cubic-bezier(0.22,1,0.36,1),
color 0.45s cubic-bezier(0.22,1,0.36,1),
transform 0.25s ease,
border 0.45s ease;

backdrop-filter:blur(10px);
}

.theme-btn:hover{

transform:scale(1.06);

background:rgba(255,255,255,0.05);
}

/* LIGHT MODE */

body.light-mode{

background:#cfcfcf;

color:#111111;

transition:
background 0.5s cubic-bezier(0.22,1,0.36,1),
color 0.5s cubic-bezier(0.22,1,0.36,1);
}

body.light-mode .theme-btn{

background:rgba(0,0,0,0.04);

border:1px solid rgba(0,0,0,0.05);

color:#111111;
}

</style>

</head>

<script>

function toggleSidebar(){

const sidebar = document.getElementById("sidebar");

const button = document.querySelector(".menu-btn");

sidebar.classList.toggle("open");

button.classList.toggle("active");

}

function toggleTheme(){

document.body.classList.toggle("light-mode");

}

</script>

<body>

<div class="menu-btn" onclick="toggleSidebar()">
⟷
</div>

<div class="theme-btn" onclick="toggleTheme()">
◐
</div>

<div class="sidebar" id="sidebar">

<a href="#">Writing</a>
<a href="#">Planning</a>
<a href="#">Growth</a>

</div>

<div class="wrapper">

<div class="logo">
sathya.
</div>

<div class="quote">
"nothing" - sathya
</div>

<div class="grid">

<!-- WRITING -->

<div class="category">

<h2>Writing</h2>

<div class="line"></div>

<div class="links">

<a href="notebook.html">• Notebook</a>

<a href="#">• Reading list</a>

<a href="#">• Notes and drafts</a>

</div>

</div>

<!-- PLANNING -->

<div class="category">

<h2>Planning</h2>

<div class="line"></div>

<div class="links">

<a href="#">• Travel planner</a>

<a href="#">• Simple budget</a>

<a href="#">• Task List</a>

</div>

</div>

<!-- GROWTH -->

<div class="category">

<h2>Growth</h2>

<div class="line"></div>

<div class="links">

<a href="#">• Goals</a>

<a href="#">• Habit tracker</a>

<a href="#">• Weekly plan</a>

</div>

</div>

</div>

</div>

</body>

</html>
