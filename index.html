<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>sathya.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{

background:#000000;
color:#cfcfcf;

font-family:'Poppins',sans-serif;

min-height:100vh;

padding:40px 28px 80px;

overflow-x:hidden;
}

/* MAIN */

.wrapper{
max-width:1200px;
margin:auto;
}

/* LOGO */

.logo{

position:relative;
top:-10px;
font-size:35px;
font-weight:600;

letter-spacing:-2px;

color:#efefef;

margin-bottom:42px;
}

/* QUOTE */

.quote{

border-left:2px solid #cfcfcf;

padding-left:22px;

font-size:18px;
font-weight:400;

line-height:1.7;

color:#cfcfcf;

max-width:900px;

margin-bottom:90px;
}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:56px;
}

/* CATEGORY */

.category h2{

font-size:30px;
font-weight:600;

letter-spacing:-1px;

margin-bottom:16px;

color:#cfcfcf;
}

.line{

height:1px;
width:100%;

background:#2f2f2f;

margin-bottom:24px;
}

/* LINKS */

.links{

display:flex;
flex-direction:column;

gap:16px;
}

.links a{

text-decoration:none;

color:#cfcfcf;

font-size:18px;
font-weight:400;

transition:
transform 0.18s ease,
opacity 0.18s ease,
color 0.18s ease;

width:fit-content;
}

.links a:hover{

transform:translateX(4px);

opacity:1;

color:#ffffff;
}

/* TABLET */

@media(max-width:1024px){

body{
padding:34px 24px 70px;
}

.logo{
font-size:35px;
}

.quote{

font-size:18px;

margin-bottom:70px;
}

.grid{

grid-template-columns:1fr;

gap:18px;
}

.category h2{
font-size:30px;
}

.links a{
font-size:18px;
}

}

/* MOBILE */

@media(max-width:640px){

body{
padding:28px 20px 60px;
}

.logo{

font-size:35px;

margin-bottom:34px;
}

.quote{

font-size:15px;

padding-left:18px;

line-height:1.6;

margin-bottom:56px;
}

.grid{
gap:42px;
}

.category h2{
font-size:28px;
}

.links a{
font-size:18px;
}

}

.menu-btn{

position:fixed;

top:28px;
right:28px;

font-size:28px;

color:#cfcfcf;

cursor:pointer;

z-index:2000;

transition:
transform 0.35s ease,
opacity 0.25s ease;

user-select:none;
}

.menu-btn:hover{

opacity:0.7;
}

.menu-btn.active{

transform:rotate(180deg);
}

.sidebar{

position:fixed;

top:0;
right:-260px;

width:240px;
height:100vh;

background:#000000;

border-left:1px solid #2f2f2f;

padding-top:110px;
padding-right:28px;

transition:left 0.35s cubic-bezier(0.4,0,0.2,1);

z-index:1500;
}

.sidebar.open{

right:0;
}

.sidebar a{

display:block;

color:#cfcfcf;

text-decoration:none;

font-size:18px;

margin-bottom:28px;

transition:
transform 0.2s ease,
color 0.2s ease;

}

.sidebar a:hover{

color:#efefef;

transform:translateX(4px);
}
  
</style>

</head>

<script>

function toggleSidebar(){

const sidebar = document.getElementById("sidebar");

const button = document.querySelector(".menu-btn");

sidebar.classList.toggle("open");

button.classList.toggle("active");

}

</script>

<body>

<div class="menu-btn" onclick="toggleSidebar()">
↔
</div>

<div class="sidebar" id="sidebar">

<a href="#">Writing</a>
<a href="#">Planning</a>
<a href="#">Growth</a>

</div>

<div class="wrapper">

<div class="logo">
sathya.
</div>

<div class="quote">
"nothing" - sathya
</div>

<div class="grid">

<!-- WRITING -->

<div class="category">

<h2>Writing</h2>

<div class="line"></div>

<div class="links">

<a href="notebook.html">• Notebook</a>

<a href="#">• Reading list</a>

<a href="#">• Notes and drafts</a>

</div>

</div>

<!-- PLANNING -->

<div class="category">

<h2>Planning</h2>

<div class="line"></div>

<div class="links">

<a href="#">• Travel planner</a>

<a href="#">• Simple budget</a>

<a href="#">• Task List</a>

</div>

</div>

<!-- GROWTH -->

<div class="category">

<h2>Growth</h2>

<div class="line"></div>

<div class="links">

<a href="#">• Goals</a>

<a href="#">• Habit tracker</a>

<a href="#">• Weekly plan</a>

</div>

</div>

</div>

</div>

</body>

</html>
