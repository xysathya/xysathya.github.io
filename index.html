<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sathya.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-main: #ffffff;
            --text-muted: #555555;
            --panel-bg: #121212;
            --panel-border: #222222;
            --row-divider: #1c1c1c;
            --row-hover: rgba(255, 255, 255, 0.02);
            --font-family: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 24px;
            max-width: 1140px;
            margin: 0 auto;
            width: 95%;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Header Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none !important;
        }

        .toggle-icon {
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }

        /* Centered Search Input Pill */
        .search-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto 70px auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 50px;
            padding: 14px 24px 14px 52px;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .search-bar:focus {
            border-color: #444444;
        }

        .search-bar::placeholder {
            color: #444444;
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 15px;
            color: #444444;
            pointer-events: none;
        }

        /* Asymmetric Layout Workspace Hub */
        .workspace-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 32px;
            margin-bottom: 80px;
            align-items: start;
        }

        /* Large Capsule Panel */
        .capsule-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 32px 8px 16px 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        /* Stack container for the right side panels */
        .panel-stack-side {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text-main);
            margin-bottom: 24px;
            padding: 0 24px;
        }

        /* Flat Structured Rows */
        .document-list {
            list-style: none;
            display: flex;
            flex-direction: column;
        }

        .document-list li {
            border-bottom: 1px solid var(--row-divider);
        }

        .document-list li:last-child {
            border-bottom: none;
        }

        .document-list a {
            display: block;
            padding: 14px 24px;
            color: #dddddd;
            text-decoration: none !important;
            font-size: 14.5px;
            font-weight: 400;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent !important;
        }

        /* Faint clean row transitions */
        .document-list li:hover {
            background-color: var(--row-hover);
        }

        .document-list li:hover a {
            color: #ffffff;
            padding-left: 30px; /* Elegant text glide transition */
        }

        /* Flat Grounded Footer Row */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }

        .footer-links-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
            width: 100%;
        }

        .footer-links-row a {
            color: var(--text-muted);
            text-decoration: none !important;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s ease;
        }

        .footer-links-row a:hover {
            color: #ffffff;
        }

        .copyright-tag {
            color: #333333;
            font-size: 12.5px;
            letter-spacing: 0.2px;
        }

        /* Responsive Fluid Adaptations */
        @media (max-width: 900px) {
            .workspace-layout {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .capsule-panel {
                padding: 28px 4px 12px 4px;
            }
            
            body {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Header Area -->
    <header>
        <a href="#" class="logo">sathya.</a>
        <div class="toggle-icon">↔</div>
    </header>

    <main>
        <!-- Search Bar -->
        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" class="search-bar" placeholder="Search...">
        </div>

        <!-- Asymmetric Workspace Layout -->
        <div class="workspace-layout">

            <!-- Primary Left Side: UPSC (Dominant panel for heavy academic directory) -->
            <div class="capsule-panel">
                <h2 class="panel-title">Upsc</h2>
                <ul class="document-list">
                    <li><a href="#">Subjects</a></li>
                    <li><a href="#">Current affairs</a></li>
                    <li><a href="#">Ncert's</a></li>
                    <li><a href="#">Csat</a></li>
                    <li><a href="#">Notes</a></li>
                </ul>
            </div>

            <!-- Secondary Right Side Stack: Personal Management & Tracking -->
            <div class="panel-stack-side">
                
                <!-- Capsule Panel: PLANNING -->
                <div class="capsule-panel">
                    <h2 class="panel-title">Planning</h2>
                    <ul class="document-list">
                        <li><a href="#">Travel planner</a></li>
                        <li><a href="#">Simple budget</a></li>
                        <li><a href="#">Task List</a></li>
                    </ul>
                </div>

                <!-- Capsule Panel: GROWTH -->
                <div class="capsule-panel">
                    <h2 class="panel-title">Growth</h2>
                    <ul class="document-list">
                        <li><a href="#">Goals</a></li>
                        <li><a href="#">Habit tracker</a></li>
                        <li><a href="#">Weekly plan</a></li>
                    </ul>
                </div>

            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-links-row">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Disclaimer</a>
        </div>
        <div class="copyright-tag">
            &copy; 2026 Sathya. All rights reserved.
        </div>
    </footer>

</body>
</html>
