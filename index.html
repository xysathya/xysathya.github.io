<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sathya.</title>

    <!-- Universal iPad stabilization: catches text fragments instantly before document draw -->
    <script>
      if (window.location.search.includes('tf=1') || window.location.href.includes(':~:text=')) {
        document.documentElement.classList.add('instant-landing');
      }
    </script>

    <meta name="description" content="Personal workspace for study notes, resources, and current affairs.">

    <!-- Google Tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5VGX2K64Y4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5VGX2K64Y4');
    </script>
    
    <!-- Favicon Engine -->
    <link id="favicon" rel="icon" type="image/png" href="favicon-light.png">

    <script>
      const favicon = document.getElementById('favicon');
      const darkMode = window.matchMedia('(prefers-color-scheme: dark)');
      
      function updateFavicon(e) {
        favicon.href = e.matches ? 'favicon-dark.png' : 'favicon-light.png';
      }
      
      updateFavicon(darkMode);
      darkMode.addEventListener('change', updateFavicon);
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
            --bg-color: #0b0b0b;
            --text-main: #ffffff;
            --text-muted: #666666;
            --panel-bg: #121212;
            --panel-border: #222222;
            --row-divider: #1c1c1c;
            --row-hover: rgba(255, 255, 255, 0.015);
            --header-bg: #1a231e;
            --header-border: #222c26;
            
            /* 3D Container Variables */
            --myspace-bg: #141414;
            --myspace-border: #242424;
            --myspace-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            --card-shadow-hover: 0 16px 36px rgba(0, 0, 0, 0.45);
            --card-border-hover: #383838;

            /* Vertical cascade parameters */
            --cascade-distance: 24px;
            --cascade-duration-exit: 0.2s;
            --cascade-duration-entry: 0.28s;
        }

        body.light-mode {
            --bg-color: #ebebe4;
            --text-main: #111111;
            --text-muted: #88888e;
            --panel-bg: #ffffff;
            --panel-border: #e2e2e7;
            --row-divider: #f2f2f7;
            --row-hover: rgba(0, 0, 0, 0.01);
            --header-bg: #e9ebe6;
            --header-border: #d4d8cf;
            
            /* 3D Container Variables (Light) */
            --myspace-bg: #f5f5f0;
            --myspace-border: #dcdce0;
            --myspace-shadow: 0 20px 45px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            --card-shadow-hover: 0 16px 32px rgba(0, 0, 0, 0.09);
            --card-border-hover: #b8b8c0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent !important;
            tap-highlight-color: transparent !important;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 24px;
            max-width: 1200px;
            margin: 0 auto;
            width: 95%;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            transition: background-color 0.8s var(--ease-premium), color 0.8s var(--ease-premium);
        }

        @keyframes masterEntrance {
            from { opacity: 0; transform: translate3d(0, 24px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        header, main, footer {
            opacity: 1;
            will-change: transform, opacity;
            animation: masterEntrance 1.2s var(--ease-premium) backwards;
        }

        header { animation-delay: 0.04s; }
        main { animation-delay: 0.16s; }
        footer { animation-delay: 0.28s; }

        header {
            position: relative;
            background-color: var(--header-bg);
            border: 1px solid var(--header-border);
            border-radius: 50px;
            width: 100%;
            height: 72px;
            margin: 0 auto 60px auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: background-color 0.8s var(--ease-premium), border-color 0.8s var(--ease-premium), box-shadow 0.8s var(--ease-premium);
        }

        body:not(.light-mode) header {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .header-inner-view {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            will-change: transform, opacity;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        #headerMainView {
            opacity: 1;
            transform: translate3d(0, 0, 0);
            pointer-events: auto;
            z-index: 2;
        }

        #headerSearchView {
            opacity: 0;
            transform: translate3d(0, calc(-1 * var(--cascade-distance)), 0);
            pointer-events: none;
            z-index: 1;
        }

        header.state-search #headerMainView {
            animation: skyfallExit var(--cascade-duration-exit) ease-in both;
            pointer-events: none;
        }
        header.state-search #headerSearchView {
            animation: skyfallEntry var(--cascade-duration-entry) cubic-bezier(0.16, 1, 0.3, 1) both;
            animation-delay: var(--cascade-duration-exit);
            pointer-events: auto;
        }

        header.state-main #headerSearchView {
            animation: skyfallExit var(--cascade-duration-exit) ease-in both;
            pointer-events: none;
        }
        header.state-main #headerMainView {
            animation: skyfallEntry var(--cascade-duration-entry) cubic-bezier(0.16, 1, 0.3, 1) both;
            animation-delay: var(--cascade-duration-exit);
            pointer-events: auto;
        }

        @keyframes skyfallExit {
            0% { transform: translate3d(0, 0, 0); opacity: 1; }
            100% { transform: translate3d(0, var(--cascade-distance), 0); opacity: 0; }
        }

        @keyframes skyfallEntry {
            0% { transform: translate3d(0, calc(-1 * var(--cascade-distance)), 0); opacity: 0; }
            100% { transform: translate3d(0, 0, 0); opacity: 1; }
        }

        .header-right-cluster,
        .search-control-cluster {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
            height: 100%;
        }

        .logo {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none !important;
            transition: color 0.8s var(--ease-premium);
            flex-shrink: 0;
        }

        .ctrl-btn {
            background: none;
            border: none;
            outline: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            padding: 0;
            flex-shrink: 0;
            transition: opacity 0.2s var(--ease-premium), color 0.8s var(--ease-premium);
        }

        .ctrl-btn:hover { opacity: 0.6; }

        .ctrl-btn svg,
        .search-static-icon {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: var(--text-main);
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.8s var(--ease-premium);
        }

        .search-static-icon {
            opacity: 0.4;
            flex-shrink: 0;
        }

        .search-core-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            padding: 0 16px;
            width: 100%;
            min-width: 0;
            will-change: transform, opacity;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transition: color 0.8s var(--ease-premium);
        }

        .clear-text-btn svg { opacity: 0.4; }
        .close-search-btn svg { opacity: 0.7; }

        .theme-toggle {
            width: 32px;
            height: 32px;
            position: relative;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .theme-toggle svg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22px;
            height: 22px;
            fill: none;
            stroke: var(--text-main);
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            will-change: transform, opacity;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            transition: transform 0.8s var(--ease-premium), opacity 0.8s var(--ease-premium), stroke 0.8s var(--ease-premium);
        }

        .theme-toggle .sun-icon { opacity: 0; transform: translate(-50%, -50%) rotate(-90deg) scale(0.4); }
        .theme-toggle .moon-icon { opacity: 1; transform: translate(-50%, -50%) rotate(0deg) scale(1); }
        body.light-mode .theme-toggle .sun-icon { opacity: 1; transform: translate(-50%, -50%) rotate(0deg) scale(1); }
        body.light-mode .theme-toggle .moon-icon { opacity: 0; transform: translate(-50%, -50%) rotate(90deg) scale(0.4); }

        main {
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 80px;
        }

        /* --- 3D CAPSULE WORKSPACE (MY SPACE) --- */
        .myspace-container {
            width: 100%;
            max-width: 680px;
            background-color: var(--myspace-bg);
            border: 1px solid var(--myspace-border);
            border-radius: 36px;
            padding: 32px 28px 36px 28px;
            box-shadow: var(--myspace-shadow);
            transition: background-color 0.8s var(--ease-premium), border-color 0.8s var(--ease-premium), box-shadow 0.8s var(--ease-premium);
        }

        .myspace-title {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text-main);
            margin-bottom: 28px;
            transition: color 0.8s var(--ease-premium);
        }

        .myspace-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 20px;
            width: 100%;
        }

        .myspace-card {
            flex: 1 1 calc(50% - 10px);
            min-width: 180px;
            max-width: 280px;
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            text-decoration: none !important;
            box-shadow: var(--card-shadow);
            
            will-change: transform, box-shadow, border-color;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
            
            transition: transform 0.35s var(--ease-premium), 
                        box-shadow 0.35s var(--ease-premium), 
                        border-color 0.35s var(--ease-premium), 
                        background-color 0.8s var(--ease-premium);
        }

        @media (min-width: 701px) {
            .myspace-grid.has-3-items .myspace-card {
                flex: 1 1 calc(33.333% - 14px) !important;
                max-width: 200px !important;
            }
        }

        .myspace-card-icon {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.35s var(--ease-premium);
        }

        .myspace-card-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -0.2px;
            transition: color 0.8s var(--ease-premium);
        }

        @media (hover: hover) and (pointer: fine) {
            .myspace-card:hover {
                transform: translate3d(0, -6px, 0) scale3d(1.02, 1.02, 1);
                border-color: var(--card-border-hover);
                box-shadow: var(--card-shadow-hover);
            }

            .myspace-card:hover .myspace-card-icon {
                transform: scale3d(1.08, 1.08, 1);
            }

            .footer-links-row a:hover .nav-text,
            .logo:hover .nav-text {
                transform: scale3d(1.06, 1.06, 1) !important;
            }
        }

        .myspace-card:active {
            transform: translate3d(0, -2px, 0) scale3d(0.99, 0.99, 1);
        }

        footer { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 24px; 
            width: 100%; 
        }

        .footer-links-row { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 32px; 
            flex-wrap: wrap; 
            width: 100%; 
        }

        .footer-links-row a {
            color: var(--text-muted) !important;
            text-decoration: none !important;
            font-size: 14px;
            font-weight: 400;
            display: inline-block;
            will-change: transform, opacity;
            backface-visibility: hidden;
            transition: color 0.4s var(--ease-premium);
        }

        .footer-links-row a:hover { color: var(--text-main) !important; }
        .copyright-tag { color: var(--text-muted); opacity: 0.6; font-size: 12.5px; letter-spacing: 0.2px; transition: color 0.8s var(--ease-premium); }

        .nav-text {
            display: inline-block !important;
            white-space: nowrap !important;
            transform-origin: center center !important;
            will-change: transform, opacity, background-position !important;
            transition: transform 0.4s var(--ease-premium), opacity 0.4s var(--ease-premium);
        }

        .footer-links-row a .nav-text { color: var(--text-muted) !important; }
        .footer-links-row a:hover .nav-text { color: var(--text-main) !important; }

        @keyframes fluidWave {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        a.is-wave-loading .nav-text {
            background-image: linear-gradient(90deg, #ffffff 0%, #ffffff 25%, #555555 50%, #ffffff 75%, #ffffff 100%) !important;
            background-size: 200% 100% !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            color: transparent !important;
            animation: fluidWave 0.75s infinite linear !important;
            will-change: background-position, transform !important;
            opacity: 1 !important;
        }

        body.light-mode a.is-wave-loading .nav-text {
            background-image: linear-gradient(90deg, #111111 0%, #111111 25%, #8a8a8e 50%, #111111 75%, #111111 100%) !important;
            background-size: 200% 100% !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            color: transparent !important;
            animation: fluidWave 0.75s infinite linear !important;
            will-change: background-position, transform !important;
            opacity: 1 !important;
        }

        .kinetic-locked-frame { pointer-events: none !important; }
        .kinetic-locked-frame .nav-text {
            transition: none !important;
            -webkit-transition: none !important;
        }

        @media (max-width: 700px) {
            body { padding: 40px 20px; }
            header { margin-bottom: 40px; height: 64px; }
            .header-inner-view { padding: 0 20px; }
            .logo { font-size: 22px; }
            .search-core-input { padding: 0 12px; font-size: 15px; }
            .header-right-cluster { gap: 16px; }
            
            .myspace-container { padding: 24px 18px 28px 18px; border-radius: 28px; }
            .myspace-title { font-size: 18px; margin-bottom: 20px; }
            .myspace-card { padding: 22px 16px; border-radius: 20px; }
        }

        html.instant-landing header, 
        html.instant-landing footer {
            animation: none !important;
            opacity: 1 !important;
            transform: none !important;
            will-change: auto !important;
        }

        html.instant-landing,
        html.instant-landing body,
        html.instant-landing main,
        html.instant-landing header,
        html.instant-landing * {
            transition: none !important;
            transition-duration: 0s !important;
        }
    </style>
</head>
<body>

    <header id="masterHeader">
        <div class="header-inner-view" id="headerMainView">
            <a href="index.html" class="logo">sathya.</a>
            <div class="header-right-cluster">
                <div class="theme-toggle" id="themeToggleBtn" aria-label="Toggle visual palette theme">
                    <svg class="sun-icon" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24">
                        <path d="M12 3a6 6 0 0 0 9 9 9 0 1 1-9-9Z"></path>

                </button>
            </div>
        </div>

        <form class="header-inner-view" id="headerSearchView" action="/study/search.html" method="GET">

                <button type="button" class="ctrl-btn close-search-btn" id="closeSearchBtn" aria-label="Minimize search pill">
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </form>
    </header>
    
    <main>
        <!-- 3D Capsule Workspace Container -->
        <div class="myspace-container">
            <h2 class="myspace-title">My Space</h2>
            
            <div class="myspace-grid" id="myspaceGrid">
                
                <!-- Capsule 1: Study -->
                <a href="/study/index.html" class="myspace-card">

                    </div>
                    <span class="myspace-card-title nav-text">Study</span>
                </a>

                <!-- Capsule 2: Nutrition -->
                <a href="/nutrition/index.html" class="myspace-card">
                    <div class="myspace-card-icon">
                        <!-- Custom Green Sprout Vector (Exact Match to Image 1) -->
                        <svg width="54" height="54" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

                            <!-- Y-Sprout Stem -->

                            <path d="M 252 345 C 252 315 268 285 298 250" stroke="#72b528" stroke-width="16" stroke-linecap="round"/>

                            <!-- Left Leaf (Broad Curved Leaf with Top Accent Lip and Vein) -->
                            <path d="M 242 285 C 220 310 135 315 88 225 C 78 200 82 172 85 170 C 90 170 120 165 182 188 C 242 210 258 255 242 285 Z" fill="#80ca34"/>

    <script>
        const toggleBtn = document.getElementById('themeToggleBtn');
        const bodyElement = document.body;
        const systemLightQuery = window.matchMedia('(prefers-color-scheme: light)');

        const masterHeader = document.getElementById('masterHeader');
        const openSearchBtn = document.getElementById('openSearchBtn');
        const closeSearchBtn = document.getElementById('closeSearchBtn');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const searchCoreInput = document.getElementById('searchCoreInput');

        function applyTargetPalette() {
            const activeSessionOverride = sessionStorage.getItem('dashboard-theme');
            if (activeSessionOverride) {
                if (activeSessionOverride === 'light') {
                    bodyElement.classList.add('light-mode');
                } else {
                    bodyElement.classList.remove('light-mode');
                }
            } else {
                if (systemLightQuery.matches) {
                    bodyElement.classList.add('light-mode');
                } else {
                    bodyElement.classList.remove('light-mode');
                }
            }
        }

        applyTargetPalette();

        systemLightQuery.addEventListener('change', (e) => {
            sessionStorage.removeItem('dashboard-theme');
            if (e.matches) {
                bodyElement.classList.add('light-mode');
            } else {
                bodyElement.classList.remove('light-mode');
            }
        });

        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isCurrentlyLight = bodyElement.classList.contains('light-mode');
            if (isCurrentlyLight) {
                bodyElement.classList.remove('light-mode');
                sessionStorage.setItem('dashboard-theme', 'dark');
            } else {
                bodyElement.classList.add('light-mode');
                sessionStorage.setItem('dashboard-theme', 'light');
            }
        });

        openSearchBtn.addEventListener('click', () => {
            masterHeader.classList.remove('state-main');
            masterHeader.classList.add('state-search');
            searchCoreInput.focus({ preventScroll: true });
        });

        clearSearchBtn.addEventListener('click', () => {
            searchCoreInput.value = "";
            searchCoreInput.focus();
        });

        closeSearchBtn.addEventListener('click', () => {
            masterHeader.classList.remove('state-search');
            masterHeader.classList.add('state-main');
        });

        searchCoreInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && searchCoreInput.value.trim() === "") {
                masterHeader.classList.remove('state-search');
                masterHeader.classList.add('state-main');
            }
        });

        const myspaceGrid = document.getElementById('myspaceGrid');
        if (myspaceGrid && myspaceGrid.children.length === 3) {
            myspaceGrid.classList.add('has-3-items');
        }

        const universalTargetLinks = document.querySelectorAll('footer .footer-links-row a, .logo, .myspace-card');

        universalTargetLinks.forEach(link => {
            if (!link.querySelector('.nav-text')) {
                const wrapper = document.createElement('span');
                wrapper.className = 'nav-text';
                while (link.firstChild) {
                    wrapper.appendChild(link.firstChild);
                }
                link.appendChild(wrapper);
            }
        });

        universalTargetLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                const destination = this.getAttribute('href');
                if (!destination || destination === '#' || destination.startsWith('#')) return;

                e.preventDefault();
                sessionStorage.setItem('activeUniversalTargetUrl', this.href);

                universalTargetLinks.forEach(l => l.classList.remove('is-wave-loading'));

                this.classList.add('is-wave-loading');

                setTimeout(() => {
                    window.location.href = destination;
                }, 750);
            });
        });

        window.addEventListener('pageshow', () => {
            if (document.activeElement && document.activeElement.blur) {
                document.activeElement.blur();
            }

            universalTargetLinks.forEach(l => {
                l.classList.remove('is-wave-loading');
                l.classList.remove('kinetic-locked-frame');
                const span = l.querySelector('.nav-text');
                if (span) {
                    span.style.transform = '';
                    span.style.opacity = '';
                    span.style.background = '';
                    span.style.webkitBackgroundClip = '';
                    span.style.webkitTextFillColor = '';
                }
            });

            if (window.location.search.includes('tf=1') || window.location.href.includes(':~:text=')) {
                sessionStorage.removeItem('activeUniversalTargetUrl');
                return;
            }

            const savedTargetUrl = sessionStorage.getItem('activeUniversalTargetUrl');
            if (savedTargetUrl) {
                sessionStorage.removeItem('activeUniversalTargetUrl');
            }
        });
    </script>
