<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>sathya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d1715;
font-family:'Poppins',Google sans;
color:white;
overflow-x:hidden;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
}

.logo{
text-align:center;
font-size:110px;
font-weight:500;
padding-top:40px;
padding-bottom:25px;
letter-spacing:-3px;
}

.navbar{
border-top:1px solid #666;
border-bottom:1px solid #666;
padding:20px 0;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.nav-links{
display:flex;
gap:40px;
flex-wrap:wrap;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

.nav-links a:hover{
color:#1b4740;
}

.search-btn{
background:#1d5c54;
color:white;
border:none;
padding:14px 34px;
font-size:20px;
border-radius:35px;
cursor:pointer;
}

.search-top{
position:fixed;
top:20px;
right:20px;
z-index:1000;
}

.hero{
padding-top:70px;
}

.hero h2{
text-align:center;
font-size:36px;
letter-spacing:8px;
margin-bottom:80px;
}

.main-btn{
display:inline-block;
background:#1b4740;
padding:18px 45px;
border-radius:50px;
text-decoration:none;
color:white;
font-size:22px;
transition:0.3s;
}

.main-btn:hover{
transform:scale(1.05);
}

.btn-area{
padding-left:80px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:20px;
left:-260px;
width:250px;
height:calc(100% - 40px);

background:rgba(13,23,21,0.72);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border-top-right-radius:30px;
border-bottom-right-radius:30px;

border:1px solid rgba(255,255,255,0.06);

box-shadow:
0 0 30px rgba(0,0,0,0.35),
0 0 20px rgba(37,122,108,0.12);

padding-top:80px;
transition:0.4s ease;
z-index:1000;
}
.sidebar a{
display:block;
padding:18px 30px;
color:white;
text-decoration:none;
font-size:20px;
transition:0.3s;
border-radius:16px;
margin:6px 12px;

}

.sidebar a{
display:block;
padding:18px 30px;
color:white;
text-decoration:none;
font-size:20px;
transition:0.25s ease;
border-radius:16px;
margin:6px 12px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
transform:scale(0.98);
}

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:25px;
cursor:pointer;
z-index:1100;
}

.filters{
display:flex;
gap:14px;
margin-top:24px;
margin-bottom:30px;
overflow-x:auto;
padding-bottom:10px;
scrollbar-width:none;
}

.filters::-webkit-scrollbar{
display:none;
}

.filter-pill{
background:#12352f;
color:white;
border:none;
padding:12px 22px;
border-radius:999px;
font-size:16px;
cursor:pointer;
white-space:nowrap;
}

.filter-pill.active{
background:#38d6c4;
color:black;
}

.posts-grid{
display:grid;
gap:22px;
margin-top:28px;
}

.post-card{
background:rgba(38,140,120,0.42);
border-radius:28px;
padding:28px 38px;
display:flex;
justify-content:space-between;
align-items:center;
text-decoration:none;
color:white;
font-size:20px;
font-weight:500;
transition:0.3s;
min-height:120px;
}

.post-card span:last-child{
font-size:30px;
opacity:0.9;
}

.post-card:hover{
transform:translateY(-3px);
background:rgba(50,170,145,0.55);
}

.post-card:hover{
transform:translateY(-3px);
background:rgba(50,170,145,0.55);
}

@media(min-width:1024px){

.posts-grid{
grid-template-columns:repeat(3,1fr);
}

.post-card{
min-height:140px;
font-size:20px;
}

}
  
/* MOBILE */

@media(max-width:768px){

.nav-links{
display:flex;
flex-wrap:nowrap;
align-items:center;
overflow-x:auto;
white-space:nowrap;
gap:22px;
padding:0 14px;
scrollbar-width:none;
}

.nav-links::-webkit-scrollbar{
display:none;
}

.nav-links a{
font-size:18px;
flex-shrink:0;
}

.search-btn{
flex-shrink:0;
margin-left:auto;
padding:10px 24px;
font-size:16px;
border-radius:18px;
}

.logo{
font-size:60px;
}

}
@media(min-width:769px){

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
}

.nav-links{
display:flex;
align-items:center;
gap:22px;
width:100%;
}

.search-btn{
margin-left:auto;
display:block;
}

}

/* LAPTOP */
@media(min-width:1024px){

.posts-grid{

grid-template-columns:repeat(3,1fr);

}

.post-card{
min-height:110px;

padding:24px 26px;
}

}

.top-filter{

.top-filter select{
width:100%;

padding:20px 20px;

<script>

function toggleMenu(){

let sidebar = document.getElementById("sidebar");

if(sidebar.style.left === "0px"){
sidebar.style.left = "-260px";
}
else{
sidebar.style.left = "0px";
}

}

</script>
<script>
document.addEventListener("click", function(e){

const sidebar = document.querySelector(".sidebar");
const menuBtn = document.querySelector(".menu-btn");

if(
!sidebar.contains(e.target) &&
!menuBtn.contains(e.target)
){
sidebar.style.left = "-260px";
}

});
</script>
