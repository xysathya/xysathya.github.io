<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>sathya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
}

.logo{
text-align:center;
font-size:110px;
font-weight:500;
padding-top:40px;
padding-bottom:25px;
letter-spacing:-3px;
}

.navbar{
border-top:1px solid #666;
border-bottom:1px solid #666;
padding:20px 0;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.nav-links{
display:flex;
gap:40px;
flex-wrap:wrap;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

.nav-links a:hover{
color:#1D5b51;
}

.search-btn{
background:#1D5b51;
border:none;
padding:14px 40px;
border-radius:40px;
color:white;
font-size:18px;
cursor:pointer;
}

.hero{
padding-top:70px;
}

.hero h2{
text-align:center;
font-size:36px;
letter-spacing:8px;
margin-bottom:80px;
}

.main-btn{
display:inline-block;
background:#1D5b51;
padding:18px 45px;
border-radius:50px;
text-decoration:none;
color:white;
font-size:22px;
transition:0.3s;
}

.main-btn:hover{
transform:scale(1.05);
}

.btn-area{
padding-left:80px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:250px;
height:100%;
background:#111;
padding-top:80px;
transition:0.4s;
z-index:1000;
border-right:1px solid #1D5b51;
}

.sidebar a{
display:block;
padding:18px 30px;
color:white;
text-decoration:none;
font-size:20px;
border-bottom:1px solid #222;
transition:0.3s;
}

.sidebar a:hover{
background:#1D5b51;
}

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:35px;
cursor:pointer;
z-index:1100;
}

/* MOBILE */

@media(max-width:768px){

.logo{
font-size:60px;
}

.navbar{
flex-direction:column;
gap:25px;
}

.nav-links{
justify-content:center;
}

.hero h2{
font-size:22px;
letter-spacing:4px;
}

.btn-area{
padding-left:0;
text-align:center;
}

}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">

<a href="#">Home</a>
<a href="about.html">About</a>
<a href="#">Blog</a>
<a href="#">Notes</a>
<a href="#">PYQs</a>
<a href="#">Contact</a>

</div>

<div class="menu-btn" onclick="toggleMenu()">
☰
</div>

<div class="container">

<div class="logo">
sathya.
</div>

<div class="navbar">

<div class="nav-links">
<a href="#">Home</a>
<a href="#">dot</a>
<a href="about.html">About</a>
<a href="#">My Blog</a>
<a href="#">Contact</a>
<a href="#">Items</a>
</div>

<button class="search-btn">
Search
</button>

</div>

<div class="hero">

<div class="btn-area">

<a href="#" class="main-btn">
Ramsar sites in India 2026
</a>

</div>

</div>

</div>

<script>

function toggleMenu(){

let sidebar = document.getElementById("sidebar");

if(sidebar.style.left === "0px"){
sidebar.style.left = "-260px";
}
else{
sidebar.style.left = "0px";
}

}

</script>

</body>
</html>
