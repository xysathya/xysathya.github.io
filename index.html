<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>sathya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d1715;
font-family:'Poppins',Google sans;
color:white;
overflow-x:hidden;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
}

.logo{
text-align:center;
font-size:110px;
font-weight:500;
padding-top:40px;
padding-bottom:25px;
letter-spacing:-3px;
}

.navbar{
border-top:1px solid #666;
border-bottom:1px solid #666;
padding:20px 0;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.nav-links{
display:flex;
gap:40px;
flex-wrap:wrap;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

.nav-links a:hover{
color:#1b4740;
}

.search-btn{
background:#1b4740;
border:none;
padding:14px 40px;
border-radius:40px;
color:white;
font-size:18px;
cursor:pointer;
}

.hero{
padding-top:70px;
}

.hero h2{
text-align:center;
font-size:36px;
letter-spacing:8px;
margin-bottom:80px;
}

.main-btn{
display:inline-block;
background:#1b4740;
padding:18px 45px;
border-radius:50px;
text-decoration:none;
color:white;
font-size:22px;
transition:0.3s;
}

.main-btn:hover{
transform:scale(1.05);
}

.btn-area{
padding-left:80px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:20px;
left:-260px;
width:250px;
height:calc(100% - 40px);

background:rgba(13,23,21,0.72);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border-top-right-radius:30px;
border-bottom-right-radius:30px;

border:1px solid rgba(255,255,255,0.06);

box-shadow:
0 0 30px rgba(0,0,0,0.35),
0 0 20px rgba(37,122,108,0.12);

padding-top:80px;
transition:0.4s ease;
z-index:1000;
}
.sidebar a{
display:block;
padding:18px 30px;
color:white;
text-decoration:none;
font-size:20px;
transition:0.3s;
border-radius:16px;
margin:6px 12px;

}

.sidebar a{
display:block;
padding:18px 30px;
color:white;
text-decoration:none;
font-size:20px;
transition:0.25s ease;
border-radius:16px;
margin:6px 12px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
transform:scale(0.98);
}

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:35px;
cursor:pointer;
z-index:1100;
}

/* MOBILE */

@media(max-width:768px){

.logo{
font-size:60px;
}

.navbar{
flex-direction:column;
gap:25px;
}

.nav-links{
justify-content:center;
}

.hero h2{
font-size:22px;
letter-spacing:4px;
}

.btn-area{
padding-left:0;
text-align:center;
}

}

  @media(max-width:768px){

nav{
display:flex;
justify-content:center;
align-items:center;
flex-wrap:nowrap;
gap:22px;
overflow-x:auto;
white-space:nowrap;
}

nav a{
font-size:18px;
}

}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">

<a href="#">Home</a>
<a href="about.html">About</a>
<a href="#">Blog</a>
<a href="#">Notes</a>
<a href="#">PYQs</a>
<a href="#">Contact</a>

</div>

<div class="menu-btn" onclick="toggleMenu()">
☰
</div>

<div class="container">

<div class="logo">
sathya.
</div>

<div class="navbar">

<div class="nav-links">
<a href="#">Home</a>
<a href="#">dot</a>
<a href="about.html">About</a>
<a href="#">My Blog</a>
<a href="#">Contact</a>
<a href="#">Items</a>
</div>

<button class="search-btn">
Search
</button>

</div>

<div class="hero">

<div class="btn-area">

<a href="ramsarsites.html" class="main-btn">
Ramsar sites in India 2026
</a>

</div>

</div>

</div>

<script>

function toggleMenu(){

let sidebar = document.getElementById("sidebar");

if(sidebar.style.left === "0px"){
sidebar.style.left = "-260px";
}
else{
sidebar.style.left = "0px";
}

}

</script>
<script>
document.addEventListener("click", function(e){

const sidebar = document.querySelector(".sidebar");
const menuBtn = document.querySelector(".menu-btn");

if(
!sidebar.contains(e.target) &&
!menuBtn.contains(e.target)
){
sidebar.style.left = "-260px";
}

});
</script>
</body>
</html>
