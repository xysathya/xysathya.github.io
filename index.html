<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sathya.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-main: #ffffff;
            --text-muted: #555555;
            --pill-bg: #141414;
            --pill-border: #222222;
            --pill-hover-bg: #1c1c1c;
            --pill-hover-border: #333333;
            --line-divider: #1a1a1a;
            --font-family: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 24px;
            max-width: 900px;
            margin: 0 auto;
            width: 95%;
            -webkit-font-smoothing: antialiased;
        }

        /* Minimal Navigation Top Bar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none !important;
        }

        .toggle-icon {
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }

        /* Minimalist Search Module */
        .search-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto 80px auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--pill-border);
            border-radius: 50px;
            padding: 13px 24px 13px 50px;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 14.5px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .search-bar:focus {
            border-color: #444444;
        }

        .search-bar::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 15px;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Elegant Vertical Stream Feed Directory */
        .stream-directory {
            display: flex;
            flex-direction: column;
            gap: 50px;
            width: 100%;
            margin-bottom: 90px;
        }

        .stream-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .stream-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-left: 2px;
            display: flex;
            align-items: center;
            width: 100%;
        }

        /* Clean, thin structural horizontal rules under section titles */
        .stream-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background-color: var(--line-divider);
            margin-left: 20px;
        }

        /* Natural, self-sizing wrapped inline pill clouds */
        .pill-flow {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
        }

        .pill-flow li {
            list-style: none;
        }

        .pill-flow a {
            display: inline-flex;
            align-items: center;
            background-color: var(--pill-bg);
            border: 1px solid var(--pill-border);
            border-radius: 50px;
            padding: 10px 22px;
            color: var(--text-main);
            text-decoration: none !important;
            font-size: 14.5px;
            font-weight: 400;
            letter-spacing: -0.1px;
            transition: background-color 0.15s ease, border-color 0.15s ease;
            -webkit-tap-highlight-color: transparent !important;
        }

        /* Clean micro-interaction response without color flashes or lines */
        .pill-flow a:hover, .pill-flow a:active {
            background-color: var(--pill-hover-bg);
            border-color: var(--pill-hover-border);
            text-decoration: none !important;
        }

        /* Matte Minimal Base Footer */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }

        .footer-links-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
            width: 100%;
        }

        .footer-links-row a {
            color: #444444;
            text-decoration: none !important;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s ease;
        }

        .footer-links-row a:hover {
            color: #ffffff;
        }

        .copyright-tag {
            color: #2a2a2a;
            font-size: 12px;
            letter-spacing: 0.2px;
        }

        /* Seamless Mobile Adaptation */
        @media (max-width: 600px) {
            body {
                padding: 40px 16px;
            }

            header {
                margin-bottom: 40px;
            }

            .search-container {
                margin-bottom: 50px;
            }

            .stream-directory {
                gap: 40px;
            }

            .pill-flow {
                gap: 8px;
            }

            .pill-flow a {
                padding: 9px 18px;
                font-size: 14px;
            }

            .footer-links-row {
                gap: 16px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Header Block Component -->
    <header>
        <a href="#" class="logo">sathya.</a>
        <div class="toggle-icon">↔</div>
    </header>

    <main>
        <!-- Centered Clean Search Module -->
        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" class="search-bar" placeholder="Search...">
        </div>

        <!-- Master Stream Feed Directory Base -->
        <div class="stream-directory">

            <!-- Stream Section: UPSC -->
            <div class="stream-section">
                <h2 class="stream-title">Upsc</h2>
                <ul class="pill-flow">
                    <li><a href="#">Subjects</a></li>
                    <li><a href="#">Current affairs</a></li>
                    <li><a href="#">Ncert's</a></li>
                    <li><a href="#">Csat</a></li>
                    <li><a href="#">Notes</a></li>
                </ul>
            </div>

            <!-- Stream Section: PLANNING -->
            <div class="stream-section">
                <h2 class="stream-title">Planning</h2>
                <ul class="pill-flow">
                    <li><a href="#">Travel planner</a></li>
                    <li><a href="#">Simple budget</a></li>
                    <li><a href="#">Task List</a></li>
                </ul>
            </div>

            <!-- Stream Section: GROWTH -->
            <div class="stream-section">
                <h2 class="stream-title">Growth</h2>
                <ul class="pill-flow">
                    <li><a href="#">Goals</a></li>
                    <li><a href="#">Habit tracker</a></li>
                    <li><a href="#">Weekly plan</a></li>
                </ul>
            </div>

        </div>
    </main>

    <!-- Grounded Flat Footer Area -->
    <footer>
        <div class="footer-links-row">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Disclaimer</a>
        </div>
        <div class="copyright-tag">
            &copy; 2026 Sathya. All rights reserved.
        </div>
    </footer>

</body>
</html>
