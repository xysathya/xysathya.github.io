<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sathya. - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-main: #ffffff;
            --text-muted: #555555;
            --pill-bg: rgba(255, 255, 255, 0.03);
            --pill-border: rgba(255, 255, 255, 0.06);
            --pill-hover-bg: rgba(255, 255, 255, 0.06);
            --pill-hover-border: rgba(255, 255, 255, 0.15);
            --row-divider: rgba(255, 255, 255, 0.04);
            --font-family: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px 24px;
            max-width: 1000px;
            margin: 0 auto;
            width: 95%;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Bar Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none !important;
        }

        .toggle-icon {
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s ease;
        }

        .toggle-icon:hover {
            opacity: 0.7;
        }

        /* Search Input Bar */
        .search-container {
            width: 100%;
            max-width: 520px;
            margin: 0 auto 80px auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--pill-border);
            border-radius: 50px;
            padding: 14px 24px 14px 52px;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .search-bar:focus {
            border-color: #444444;
            background-color: rgba(255, 255, 255, 0.01);
        }

        .search-bar::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 15px;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Master Directory Rows Engine */
        .directory-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-bottom: 80px;
        }

        .directory-row {
            display: flex;
            align-items: flex-start;
            padding: 32px 0;
            border-bottom: 1px solid var(--row-divider);
        }

        .directory-row:first-child {
            padding-top: 0;
        }

        .directory-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .row-label {
            width: 160px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.3px;
            padding-top: 6px;
            flex-shrink: 0;
        }

        /* Pills Wrap Container */
        .pills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            flex-grow: 1;
        }

        .pills-grid a {
            display: inline-block;
            background-color: var(--pill-bg);
            border: 1px solid var(--pill-border);
            border-radius: 50px;
            padding: 10px 22px;
            color: var(--text-main);
            text-decoration: none !important;
            font-size: 14.5px;
            font-weight: 400;
            transition: background-color 0.15s ease, border-color 0.15s ease;
            -webkit-tap-highlight-color: transparent !important;
            tap-highlight-color: transparent !important;
        }

        /* Flat premium clean interaction behavior without highlights or forced underlines */
        .pills-grid a:hover, .pills-grid a:active {
            background-color: var(--pill-hover-bg);
            border-color: var(--pill-hover-border);
            color: var(--text-main) !important;
            text-decoration: none !important;
        }

        /* Matte Grounded Footer Configuration */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
            width: 100%;
        }

        .footer-links a {
            color: #777777;
            text-decoration: none !important;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s ease;
            -webkit-tap-highlight-color: transparent !important;
        }

        .footer-links a:hover {
            color: #ffffff;
        }

        .copyright-tag {
            color: #444444;
            font-size: 12.5px;
            letter-spacing: 0.2px;
        }

        /* Responsive Layout Optimization */
        @media (max-width: 768px) {
            .directory-row {
                flex-direction: column;
                gap: 16px;
                padding: 24px 0;
            }

            .row-label {
                width: 100%;
                padding-top: 0;
                font-size: 16px;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #777777;
            }
            
            body {
                padding: 32px 16px;
            }

            header {
                margin-bottom: 40px;
            }

            .search-container {
                margin-bottom: 50px;
            }

            .footer-links {
                gap: 20px 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Platform Header Area -->
    <header>
        <a href="#" class="logo">sathya.</a>
        <div class="toggle-icon">↔</div>
    </header>

    <main>
        <!-- Clean Centered Search Bar -->
        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" class="search-bar" placeholder="Search...">
        </div>

        <!-- Directory Board Setup -->
        <div class="directory-container">

            <!-- Row Block: UPSC -->
            <div class="directory-row">
                <div class="row-label">Upsc</div>
                <div class="pills-grid">
                    <a href="#">Subjects</a>
                    <a href="#">Current affairs</a>
                    <a href="#">Ncert's</a>
                    <a href="#">Csat</a>
                    <a href="#">Notes</a>
                </div>
            </div>

            <!-- Row Block: PLANNING -->
            <div class="directory-row">
                <div class="row-label">Planning</div>
                <div class="pills-grid">
                    <a href="#">Travel planner</a>
                    <a href="#">Simple budget</a>
                    <a href="#">Task List</a>
                </div>
            </div>

            <!-- Row Block: GROWTH -->
            <div class="directory-row">
                <div class="row-label">Growth</div>
                <div class="pills-grid">
                    <a href="#">Goals</a>
                    <a href="#">Habit tracker</a>
                    <a href="#">Weekly plan</a>
                </div>
            </div>

        </div>
    </main>

    <!-- Platform Footer -->
    <footer>
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Disclaimer</a>
        </div>
        <div class="copyright-tag">
            &copy; 2026 Sathya. All rights reserved.
        </div>
    </footer>

</body>
</html>
