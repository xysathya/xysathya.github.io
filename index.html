<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sathya. - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --pill-bg: rgba(255, 255, 255, 0.04);
            --pill-border: rgba(255, 255, 255, 0.07);
            --pill-hover-bg: rgba(255, 255, 255, 0.08);
            --pill-hover-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #777777;
            --font-family: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px 24px;
            max-width: 1100px;
            margin: 0 auto;
            width: 95%;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none !important;
        }

        .toggle-icon {
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s ease;
        }

        .toggle-icon:hover {
            opacity: 0.7;
        }

        /* Search Box Bar */
        .search-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto 70px auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background-color: var(--pill-bg);
            border: 1px solid var(--pill-border);
            border-radius: 50px;
            padding: 14px 24px 14px 52px;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .search-bar:focus {
            border-color: #555555;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .search-bar::placeholder {
            color: #555555;
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 15px;
            color: #555555;
            pointer-events: none;
        }

        /* Directories Layout Grid */
        .directory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-bottom: 80px;
        }

        .group-container {
            display: flex;
            flex-direction: column;
        }

        .group-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-left: 4px;
        }

        /* Elegant Pill List Layout */
        .pills-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pills-list a {
            display: block;
            background-color: var(--pill-bg);
            border: 1px solid var(--pill-border);
            border-radius: 30px;
            padding: 11px 20px;
            color: var(--text-main);
            text-decoration: none !important;
            font-size: 14.5px;
            font-weight: 400;
            transition: background-color 0.2s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent !important;
        }

        /* Sleek premium hover mechanics without changing color strings or underlines */
        .pills-list a:hover, .pills-list a:active {
            background-color: var(--pill-hover-bg);
            border-color: var(--pill-hover-border);
            color: var(--text-main) !important;
            text-decoration: none !important;
        }

        /* Grounded Flat Footer Layout */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }

        .footer-pills-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            width: 100%;
        }

        .footer-pills-row a {
            background-color: var(--pill-bg);
            border: 1px solid var(--pill-border);
            border-radius: 30px;
            padding: 8px 18px;
            color: #bbbbbb;
            text-decoration: none !important;
            font-size: 13.5px;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
            -webkit-tap-highlight-color: transparent !important;
        }

        .footer-pills-row a:hover {
            background-color: var(--pill-hover-bg);
            border-color: var(--pill-hover-border);
            color: #ffffff;
        }

        .copyright {
            color: #555555;
            font-size: 12.5px;
            letter-spacing: 0.3px;
        }

        /* Clean Responsive Scalings */
        @media (max-width: 850px) {
            .directory-grid {
                grid-template-columns: 1fr;
                gap: 36px;
            }

            body {
                padding: 30px 20px;
            }

            header {
                margin-bottom: 40px;
            }
        }

        @media (max-width: 480px) {
            .footer-pills-row {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .footer-pills-row a {
                text-align: center;
                padding: 10px;
            }

            .footer-pills-row a:last-child {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>

    <!-- Header Block -->
    <header>
        <a href="#" class="logo">sathya.</a>
        <div class="toggle-icon">↔</div>
    </header>

    <main>
        <!-- Clean Pill Search -->
        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" class="search-bar" placeholder="Search...">
        </div>

        <!-- 3-Column Directory Grid -->
        <div class="directory-grid">

            <!-- Column Group: UPSC -->
            <div class="group-container">
                <h2 class="group-title">Upsc</h2>
                <ul class="pills-list">
                    <li><a href="#">Subjects</a></li>
                    <li><a href="#">Current affairs</a></li>
                    <li><a href="#">Ncert's</a></li>
                    <li><a href="#">Csat</a></li>
                    <li><a href="#">Notes</a></li>
                </ul>
            </div>

            <!-- Column Group: Planning -->
            <div class="group-container">
                <h2 class="group-title">Planning</h2>
                <ul class="pills-list">
                    <li><a href="#">Travel planner</a></li>
                    <li><a href="#">Simple budget</a></li>
                    <li><a href="#">Task List</a></li>
                </ul>
            </div>

            <!-- Column Group: Growth -->
            <div class="group-container">
                <h2 class="group-title">Growth</h2>
                <ul class="pills-list">
                    <li><a href="#">Goals</a></li>
                    <li><a href="#">Habit tracker</a></li>
                    <li><a href="#">Weekly plan</a></li>
                </ul>
            </div>

        </div>
    </main>

    <!-- Footer Block -->
    <footer>
        <div class="footer-pills-row">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Disclaimer</a>
        </div>
        <div class="copyright">
            &copy; 2026 Sathya. All rights reserved.
        </div>
    </footer>

</body>
</html>
